name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg-dev gettext
      
      - name: Compile translations
        run: |
          cd lang/po
          for po in *.po; do
            lang=$(basename $po .po)
            mkdir -p ../mo/$lang/LC_MESSAGES
            msgfmt $po -o ../mo/$lang/LC_MESSAGES/betcon.mo
          done
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Create .tar.gz
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' --exclude='build' --exclude='.venv' \
              -czf dist/betcon-$VERSION-source.tar.gz .
      
      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p packaging/deb/betcon_${VERSION}/DEBIAN
          mkdir -p packaging/deb/betcon_${VERSION}/usr/bin
          mkdir -p packaging/deb/betcon_${VERSION}/usr/share/applications
          mkdir -p packaging/deb/betcon_${VERSION}/usr/share/pixmaps
          mkdir -p packaging/deb/betcon_${VERSION}/opt/betcon
          
          # Copy Python source files maintaining directory structure
          cp -r src packaging/deb/betcon_${VERSION}/opt/betcon/
          cp -r ui packaging/deb/betcon_${VERSION}/opt/betcon/
          cp -r lang packaging/deb/betcon_${VERSION}/opt/betcon/
          cp -r assets packaging/deb/betcon_${VERSION}/opt/betcon/
          cp -r resources packaging/deb/betcon_${VERSION}/opt/betcon/
          cp -r default packaging/deb/betcon_${VERSION}/opt/betcon/
          
          # Create wrapper script
          cat > packaging/deb/betcon_${VERSION}/usr/bin/betcon << 'EOF'
          #!/bin/bash
          cd /opt/betcon/src
          exec python3 Betcon "$@"
          EOF
          chmod +x packaging/deb/betcon_${VERSION}/usr/bin/betcon
          
          # Install desktop file and icon
          cp resources/betcon.desktop packaging/deb/betcon_${VERSION}/usr/share/applications/
          cp resources/icon.png packaging/deb/betcon_${VERSION}/usr/share/pixmaps/betcon.png
          
          # Create control file with dependencies
          cat > packaging/deb/betcon_${VERSION}/DEBIAN/control << EOF
          Package: betcon
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: python3, python3-pyside6.qtcore, python3-pyside6.qtgui, python3-pyside6.qtwidgets, qt6-tools-dev, python3-numpy, python3-yaml, python3-pil, python3-pyqtgraph, python3-colorama, python3-pyexcel-ods, python3-odfpy
          Maintainer: soker90 <soker90@gmail.com>
          Description: Aplicación para la gestión de apuestas deportivas
           Betcon es una aplicación de escritorio para gestionar apuestas deportivas,
           incluyendo seguimiento de beneficios, estadísticas y más.
          EOF
          
          dpkg-deb --build packaging/deb/betcon_${VERSION}
          mv packaging/deb/betcon_${VERSION}.deb dist/betcon-${VERSION}-amd64.deb
      
      - name: Build .rpm package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
          cat > ~/rpmbuild/SPECS/betcon.spec << EOF
          Name:           betcon
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Aplicación para la gestión de apuestas deportivas
          License:        GPLv3
          URL:            https://github.com/soker90/betcon
          Requires:       python3 python3-pyside6 qt6-qttools python3-numpy python3-pyyaml python3-pillow python3-pyqtgraph python3-colorama python3-pyexcel-ods python3-odfpy
          
          %description
          Betcon es una aplicación de escritorio para gestionar apuestas deportivas,
          incluyendo seguimiento de beneficios, estadísticas y más.
          
          %install
          mkdir -p %{buildroot}/opt/betcon
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/pixmaps
          
          # Copy Python source files maintaining directory structure
          cp -r ${PWD}/src %{buildroot}/opt/betcon/
          cp -r ${PWD}/ui %{buildroot}/opt/betcon/
          cp -r ${PWD}/lang %{buildroot}/opt/betcon/
          cp -r ${PWD}/assets %{buildroot}/opt/betcon/
          cp -r ${PWD}/resources %{buildroot}/opt/betcon/
          cp -r ${PWD}/default %{buildroot}/opt/betcon/
          
          # Create wrapper script
          cat > %{buildroot}/usr/bin/betcon << 'EOFBIN'
          #!/bin/bash
          cd /opt/betcon/src
          exec python3 Betcon "\$@"
          EOFBIN
          chmod +x %{buildroot}/usr/bin/betcon
          
          cp ${PWD}/resources/betcon.desktop %{buildroot}/usr/share/applications/
          cp ${PWD}/resources/icon.png %{buildroot}/usr/share/pixmaps/betcon.png
          
          %files
          /opt/betcon/*
          /usr/bin/betcon
          /usr/share/applications/betcon.desktop
          /usr/share/pixmaps/betcon.png
          EOF
          
          rpmbuild -bb ~/rpmbuild/SPECS/betcon.spec
          cp ~/rpmbuild/RPMS/x86_64/betcon-${VERSION}-1.*.rpm dist/betcon-${VERSION}-x86_64.rpm
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller betcon.spec
      
      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Create installer with Inno Setup
        run: |
          choco install innosetup -y
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          
          $InnoScript = @"
          #define MyAppName "Betcon"
          #define MyAppVersion "$VERSION"
          #define MyAppPublisher "soker90"
          #define MyAppURL "https://github.com/soker90/betcon"
          #define MyAppExeName "betcon.exe"
          
          [Setup]
          AppId={{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          AppPublisherURL={#MyAppURL}
          AppSupportURL={#MyAppURL}
          AppUpdatesURL={#MyAppURL}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputBaseFilename=betcon-{#MyAppVersion}-setup
          OutputDir=dist
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          
          [Languages]
          Name: "spanish"; MessagesFile: "compiler:Languages\Spanish.isl"
          Name: "english"; MessagesFile: "compiler:Default.isl"
          
          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
          
          [Files]
          Source: "dist\betcon\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon
          
          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@
          
          $InnoScript | Out-File -FilePath "betcon.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" betcon.iss
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

